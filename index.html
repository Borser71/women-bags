<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="verification" content="1295e52abfc7aa0e332cc8d6875d17" />
    <title>Женские сумки</title>
    <style>
        /* ===== ОБЩИЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            display: flex;
            align-items: center;
            font-size: 28px;
            color: #1a1a2e;
            gap: 10px;
        }

        .header h1 span {
            color: #e94560;
        }

        .header-logo {
            height: 60px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .cart-icon {
            background: #1a1a2e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-icon:hover {
            background: #e94560;
        }

        .cart-badge {
            background: #e94560;
            color: #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }

        /* ===== БЛОК С КАРТИНКОЙ ===== */
        .hero-image {
            text-align: center;
            margin: 20px 0 30px 0;
        }

        .hero-image img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        /* ===== КАТАЛОГ ===== */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            background: #f5f6fa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 12px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .product-desc {
            font-size: 14px;
            color: #666;
            flex-grow: 1;
            margin-bottom: 10px;
            white-space: pre-line;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 14px;
        }

        .product-price span {
            font-size: 16px;
            font-weight: 400;
            color: #888;
        }

        .btn-add {
            background: #1a1a2e;
            color: #fff;
            border: none;
            padding: 12px 0;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-add:hover {
            background: #e94560;
        }

        /* ===== КОРЗИНА ===== */
        .cart-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .cart-overlay.active {
            display: flex;
        }

        .cart-modal {
            background: #fff;
            border-radius: 20px;
            max-width: 550px;
            width: 95%;
            max-height: 85vh;
            padding: 30px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .cart-header h2 {
            font-size: 24px;
            color: #1a1a2e;
        }

        .cart-close {
            background: none;
            border: none;
            font-size: 28px;
            color: #888;
            cursor: pointer;
        }

        .cart-close:hover {
            color: #e94560;
        }

        .cart-empty {
            text-align: center;
            color: #888;
            padding: 40px 0;
            font-size: 18px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f0f2f5;
            gap: 12px;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            color: #1a1a2e;
        }

        .cart-item-price {
            font-size: 14px;
            color: #888;
        }

        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-item-controls button {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-item-controls button:hover {
            border-color: #1a1a2e;
            background: #1a1a2e;
            color: #fff;
        }

        .cart-item-qty {
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .cart-item-total {
            font-weight: 700;
            color: #e94560;
            min-width: 70px;
            text-align: right;
        }

        .cart-footer {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f0f2f5;
        }

        /* ===== ФОРМА ЗАКАЗА ===== */
        .order-form {
            margin-top: 15px;
        }

        .order-form label {
            display: block;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .order-form input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
            transition: border 0.2s;
        }

        .order-form input:focus {
            outline: none;
            border-color: #e94560;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 22px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 15px;
        }

        .cart-total span {
            color: #e94560;
        }

        .btn-checkout {
            width: 100%;
            background: #e94560;
            color: #fff;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-checkout:hover {
            background: #c0392b;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1a1a2e;
            color: #fff;
            padding: 16px 28px;
            border-radius: 12px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== ПОДВАЛ С СОЦСЕТЯМИ ===== */
        .footer {
            text-align: center;
            padding: 40px 0 20px;
            color: #aaa;
            font-size: 14px;
        }

        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            color: #fff;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .btn-telegram {
            background: #0088cc;
        }

        .btn-telegram:hover {
            background: #0077b3;
        }

        .btn-whatsapp {
            background: #25d366;
        }

        .btn-whatsapp:hover {
            background: #1da851;
        }

        .social-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            .social-buttons {
                flex-direction: column;
                align-items: center;
            }
            .social-btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== ШАПКА ===== -->

    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО КОРЗИНЫ С ФОРМОЙ ===== -->
    <div class="cart-overlay" id="cartOverlay" onclick="closeCartOutside(event)">
        <div class="cart-modal" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h2>🛍️ Корзина</h2>
                <button class="cart-close" onclick="toggleCart()">✕</button>
            </div>
            <div id="cartItems"></div>
            <div class="cart-footer" id="cartFooter" style="display:none;">
                <div class="cart-total">
                    Итого: <span id="cartTotal">0 ₽</span>
                </div>

                <!-- ===== ФОРМА ДАННЫХ ПОКУПАТЕЛЯ ===== -->
                <form id="orderForm" action="https://formspree.io/f/xzdqnzyv" method="POST">
                    <div class="order-form">
                        <label for="customerName">Имя *</label>
                        <input type="text" id="customerName" name="name" placeholder="Введите ваше имя" required />

                        <label for="customerPhone">Телефон *</label>
                        <input type="tel" id="customerPhone" name="phone" placeholder="+7 (___) ___-__-__" required />

                        <label for="customerEmail">Email *</label>
                        <input type="email" id="customerEmail" name="email" placeholder="example@mail.ru" required />

                        <label for="customerAddress">Адрес доставки *</label>
                        <input type="text" id="customerAddress" name="address" placeholder="Город, улица, дом, квартира" required />

                        <!-- Скрытые поля с данными заказа -->
                        <input type="hidden" id="orderDetails" name="order" value="" />
                    </div>

                    <button type="submit" class="btn-checkout" style="margin-top: 10px;">
                        ✅ Оформить заказ
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ===== УВЕДОМЛЕНИЕ ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  НАСТРОЙКА ОПЛАТЫ (ЗАМЕНИ НА ССЫЛКУ UNITPAY)
        // ============================================================
        var PAYMENT_URL = "https://interbor.getplatinum.ru/payment/0S54H1t";

        // ============================================================
        //  ТОВАРЫ
        // ============================================================
        var products = [{
            id: 1,
            name: "КРОСС-БОДИ",
            desc: "Компактная и удобная сумка на каждый день. Регулируемый ремень и лаконичный дизайн делают ее универсальным аксессуаром.",
            price: 3042,
            image: "https://borser.site/images/111.png"
        }, {
            id: 2,
            name: "СУМКА НА ЦЕПОЧКЕ",
            desc: "Элегантная модель с просрочкой и золотой цепочкой. Подходит для вечерних образов и особых случаев.",
            price: 2990,
            image: "https://borser.site/images/22.png"
        }, {
            id: 3,
            name: "СУМКА С РУЧКОЙ",
            desc: "Классическая и вместительная сумка с жесткой формой. Идеальна для работы и деловых встреч. Сочетает стиль и функциональность.",
            price: 4096,
            image: "https://borser.site/images/33.png"
        }, {
            id: 4,
            name: "СУМКА С ПЛЕТЕНИЕМ",
            desc: "Мягкая объёмная форма, плетёная текстура. Выглядит премиально и подходит для повседневных и деловых образов.",
            price: 5607,
            image: "https://borser.site/images/44.png"
        }, {
            id: 5,
            name: "СУМКА-ТОУТ",
            desc: "Структурированная модель с жёстким каркасом и двумя ручками. Элегантная и вместительная, подходит для офиса и города.",
            price: 5571,
            image: "https://borser.site/images/5.png"
        }, {
            id: 6,
            name: "СУМКА-БАГЕТ",
            desc: "Компактная модель с тиснением под крокодила. Акцентный модный аксессуар для лёгких и женственных образов.",
            price: 4190,
            image: "https://borser.site/images/6.png"
        }];

        // ============================================================
        //  КОРЗИНА
        // ============================================================
        var cart = {};

        // ============================================================
        //  ПОКАЗАТЬ ТОВАРЫ
        // ============================================================
        function renderProducts() {
            var grid = document.getElementById('productsGrid');
            var html = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                html += `
                    <div class="product-card">
                        <div class="product-image">
                            <img src="${p.image}" alt="${p.name}" />
                        </div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">${p.price.toLocaleString()} <span>₽</span></div>
                        <button class="btn-add" onclick="addToCart(${p.id})">
                            + В корзину
                        </button>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        // ============================================================
        //  ПОСЧИТАТЬ СУММУ И КОЛИЧЕСТВО
        // ============================================================
        function getTotals() {
            var total = 0;
            var count = 0;
            for (var id in cart) {
                total += cart[id].price * cart[id].qty;
                count += cart[id].qty;
            }
            return { total: total, count: count };
        }

        // ============================================================
        //  ДОБАВИТЬ В КОРЗИНУ
        // ============================================================
        function addToCart(id) {
            var product = null;
            for (var i = 0; i < products.length; i++) {
                if (products[i].id === id) {
                    product = products[i];
                    break;
                }
            }
            if (!product) return;

            if (cart[id]) {
                cart[id].qty += 1;
            } else {
                cart[id] = {
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    qty: 1
                };
            }

            updateUI();
            showToast('✅ ' + product.name + ' добавлен в корзину');
        }

        // ============================================================
        //  УБРАТЬ ИЗ КОРЗИНЫ
        // ============================================================
        function removeFromCart(id) {
            if (!cart[id]) return;
            cart[id].qty -= 1;
            if (cart[id].qty <= 0) {
                delete cart[id];
            }
            updateUI();
        }

        // ============================================================
        //  ОБНОВИТЬ ВСЁ
        // ============================================================
        function updateUI() {
            var totals = getTotals();

            document.getElementById('cartCount').textContent = totals.count;

            var container = document.getElementById('cartItems');
            var footer = document.getElementById('cartFooter');
            var totalEl = document.getElementById('cartTotal');

            var keys = Object.keys(cart);
            if (keys.length === 0) {
                container.innerHTML = '<div class="cart-empty">🛒 Корзина пуста</div>';
                footer.style.display = 'none';
                return;
            }

            footer.style.display = 'block';
            var html = '';
            for (var i = 0; i < keys.length; i++) {
                var id = keys[i];
                var item = cart[id];
                var subtotal = item.price * item.qty;
                html += `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price.toLocaleString()} ₽</div>
                        </div>
                        <div class="cart-item-controls">
                            <button onclick="removeFromCart(${item.id})">−</button>
                            <span class="cart-item-qty">${item.qty}</span>
                            <button onclick="addToCart(${item.id})">+</button>
                        </div>
                        <div class="cart-item-total">${subtotal.toLocaleString()} ₽</div>
                    </div>
                `;
            }
            container.innerHTML = html;
            totalEl.textContent = totals.total.toLocaleString() + ' ₽';
        }

        // ============================================================
        //  ОТКРЫТЬ/ЗАКРЫТЬ КОРЗИНУ
        // ============================================================
        function toggleCart() {
            var overlay = document.getElementById('cartOverlay');
            if (overlay.classList.contains('active')) {
                overlay.classList.remove('active');
            } else {
                overlay.classList.add('active');
                updateUI();
            }
        }

        function closeCartOutside(e) {
            if (e.target === e.currentTarget) {
                toggleCart();
            }
        }

        // ============================================================
        //  ОБРАБОТКА ФОРМЫ ПЕРЕД ОТПРАВКОЙ
        // ============================================================
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            var name = document.getElementById('customerName').value.trim();
            var phone = document.getElementById('customerPhone').value.trim();
            var email = document.getElementById('customerEmail').value.trim();
            var address = document.getElementById('customerAddress').value.trim();

            if (!name || !phone || !email || !address) {
                e.preventDefault();
                showToast('⚠️ Пожалуйста, заполните все поля формы');
                return;
            }

            var totals = getTotals();

            // Формируем текст заказа
            var orderText = 'НОВЫЙ ЗАКАЗ!\n\n';
            orderText += 'Клиент: ' + name + '\n';
            orderText += 'Телефон: ' + phone + '\n';
            orderText += 'Email: ' + email + '\n';
            orderText += 'Адрес: ' + address + '\n\n';
            orderText += 'Состав заказа:\n';

            var keys = Object.keys(cart);
            for (var i = 0; i < keys.length; i++) {
                var id = keys[i];
                var item = cart[id];
                var subtotal = item.price * item.qty;
                orderText += '• ' + item.name + ' × ' + item.qty + ' = ' + subtotal.toLocaleString() + ' ₽\n';
            }

            orderText += '\nИтого: ' + totals.total.toLocaleString() + ' ₽';

            // Записываем данные заказа в скрытое поле
            document.getElementById('orderDetails').value = orderText;

            // Открываем оплату в новом окне
            var payUrl = PAYMENT_URL + '?amount=' + totals.total;
            window.open(payUrl, '_blank');

            // Очищаем корзину после отправки
            cart = {};
            updateUI();

            showToast('✅ Заказ отправлен! Сумма: ' + totals.total.toLocaleString() + ' ₽');
        });

        // ============================================================
        //  УВЕДОМЛЕНИЕ
        // ============================================================
        var toastTimeout;

        function showToast(message) {
            var el = document.getElementById('toast');
            el.textContent = message;
            el.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(function() {
                el.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        renderProducts();
        updateUI();

        console.log('✅ Магазин работает! Товаров: ' + products.length);
    </script>
</body>
</html>
