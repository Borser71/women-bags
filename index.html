<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Мой магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 40px 0 30px;
        }

        .header h1 {
            font-size: 36px;
            color: #1a1a2e;
        }

        .header h1 span {
            color: #e94560;
        }

        .header p {
            color: #555;
            font-size: 18px;
            margin-top: 8px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .product-card {
            background: #fff;
            border-radius: 16px;
            padding: 20px 20px 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.10);
        }

        .product-image {
            width: 100%;
            aspect-ratio: 1/1;
            background: #eef1f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .product-desc {
            font-size: 14px;
            color: #666;
            flex-grow: 1;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 14px;
        }

        .product-price span {
            font-size: 16px;
            font-weight: 400;
            color: #888;
        }

        .btn-buy {
            display: inline-block;
            background: #1a1a2e;
            color: #fff;
            text-align: center;
            padding: 14px 0;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: background 0.2s;
            width: 100%;
            border: none;
            cursor: pointer;
        }

        .btn-buy:hover {
            background: #e94560;
        }

        .footer {
            text-align: center;
            padding: 40px 0 20px;
            color: #aaa;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
            .header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>🛒 Мой <span>Магазин</span></h1>
            <p>Выберите товар и нажмите «Купить»</p>
        </div>

        <div class="products-grid" id="productsGrid"></div>

        <div class="footer">© 2026 Мой магазин · Доставка по всей России</div>
    </div>

    <script>
        // ============================================================
        //  ТОВАРЫ — МЕНЯЙ НА СВОИ!
        // ============================================================
        var products = [{
            id: 1,
            name: "Товар №1",
            desc: "Краткое описание товара",
            price: 1500,
            image: "📦",
            link: "https://interbor.getplatinum.ru/payment/ССЫЛКА_1" // ЗАМЕНИ!
        }, {
            id: 2,
            name: "Товар №2",
            desc: "Краткое описание товара",
            price: 2300,
            image: "🎒",
            link: "https://interbor.getplatinum.ru/payment/ССЫЛКА_2" // ЗАМЕНИ!
        }, {
            id: 3,
            name: "Товар №3",
            desc: "Краткое описание товара",
            price: 3700,
            image: "👟",
            link: "https://interbor.getplatinum.ru/payment/ССЫЛКА_3" // ЗАМЕНИ!
        }, {
            id: 4,
            name: "Товар №4",
            desc: "Краткое описание товара",
            price: 4200,
            image: "⌚",
            link: "https://interbor.getplatinum.ru/payment/ССЫЛКА_4" // ЗАМЕНИ!
        }, {
            id: 5,
            name: "Товар №5",
            desc: "Краткое описание товара",
            price: 1800,
            image: "🎧",
            link: "https://interbor.getplatinum.ru/payment/ССЫЛКА_5" // ЗАМЕНИ!
        }, {
            id: 6,
            name: "Товар №6",
            desc: "Краткое описание товара",
            price: 990,
            image: "💡",
            link: "https://interbor.getplatinum.ru/payment/0S54H1t" // ТВОЯ ГОТОВАЯ ССЫЛКА
        }];

        // ============================================================
        //  ПОКАЗАТЬ ТОВАРЫ
        // ============================================================
        function renderProducts() {
            var grid = document.getElementById('productsGrid');
            var html = '';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                html += `
                    <div class="product-card">
                        <div class="product-image">${p.image}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">${p.price.toLocaleString()} <span>₽</span></div>
                        <a href="${p.link}" class="btn-buy" target="_blank">Купить</a>
                    </div>
                `;
            }
            grid.innerHTML = html;
        }

        // ============================================================
        //  ЗАПУСК
        // ============================================================
        renderProducts();
        console.log('✅ Магазин работает! Товаров: ' + products.length);
    </script>

</body>
</html>
